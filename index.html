<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Chad Willer Clicker</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at top, #3a1f1f, #1a0f0f);
  color: white;
  overflow: hidden;
}

/* TOP BAR */
.top {
  position: absolute;
  top: 10px;
  width: 100%;
  text-align: center;
  font-size: 26px;
  font-weight: bold;
  text-shadow: 0 0 10px black;
}

/* MAIN LAYOUT */
.container {
  display: flex;
  height: 100vh;
}

/* LEFT SIDE */
.left {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

/* FLOATING CHAD */
.chad {
  width: 270px;
  border-radius: 20px;
  cursor: pointer;
  animation: float 3s ease-in-out infinite;
  transition: transform 0.15s;
  box-shadow: 0 0 30px rgba(0,0,0,0.6);
}

.chad:active {
  transform: scale(0.95);
}

@keyframes float {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-12px); }
  100% { transform: translateY(0px); }
}

/* STATS */
.stats {
  margin-top: 25px;
  font-size: 18px;
  text-align: center;
  line-height: 1.6em;
  opacity: 0.95;
}

/* RIGHT SHOP */
.right {
  width: 430px;
  background: linear-gradient(180deg, #f2c27d, #e0a85a);
  color: black;
  padding: 15px;
  overflow-y: auto;
}

/* TITLE */
.shop-title {
  font-size: 30px;
  font-weight: bold;
  text-align: center;
  margin-bottom: 15px;
  text-shadow: 0 1px 0 rgba(255,255,255,0.5);
}

/* UPGRADE BOX */
.upgrade {
  background: rgba(255,255,255,0.5);
  margin: 12px 0;
  padding: 12px;
  border-radius: 14px;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
  transition: 0.15s;
  font-weight: bold;
}

.upgrade:hover {
  transform: scale(1.05);
  background: rgba(255,255,255,0.7);
}

.upgrade:active {
  transform: scale(0.98);
}

.small {
  font-size: 12px;
  opacity: 0.7;
}

/* BUTTON TEXT STYLE IMPROVEMENT */
.statLabel {
  font-weight: bold;
  opacity: 0.9;
}
</style>
</head>

<body>

<div class="top">
  💰 Chad Points: <span id="score">0</span>
</div>

<div class="container">

  <!-- LEFT -->
  <div class="left">

    <img class="chad"
      src="https://i.imgur.com/8QfQF8M.png"
      onclick="clickChad()"
    />

    <div class="stats">
      <div><span class="statLabel">Per Click:</span> <span id="cpc">1</span></div>
      <div><span class="statLabel">Auto:</span> <span id="auto">0</span>/sec</div>
      <br>
      <div><span class="statLabel">Ascension Multiplier:</span> <span id="asc">0</span>x</div>
      <div><span class="statLabel">Ascension Bank:</span> <span id="bank">0</span>x</div>
    </div>

  </div>

  <!-- RIGHT -->
  <div class="right">

    <div class="shop-title">Click Power</div>

    <div class="upgrade" onclick="buyClick()">
      <div>
        Cursor<br>
        <span class="small">+1 per click</span>
      </div>
      <div>Cost: <span id="clickCost">10</span></div>
    </div>

    <div class="upgrade" onclick="buyAuto()">
      <div>
        Auto Click<br>
        <span class="small">+1 per second</span>
      </div>
      <div>Cost: <span id="autoCost">25</span></div>
    </div>

    <div class="upgrade" onclick="claimAscension()">
      <div>
        ASCEND<br>
        <span class="small">Reset run, gain permanent multiplier</span>
      </div>
      <div>RESET</div>
    </div>

  </div>
</div>

<script>

let score = 0;
let cpc = 1;
let auto = 0;

let clickCost = 10;
let autoCost = 25;

/* ASCENSION SYSTEM */
let ascensions = 0;
let ascensionBank = 0;
let totalSpent = 0;

/* SCALING FUNCTION */
function calcAscensionGain(spent) {
  return Math.floor(Math.log10(spent + 10) * Math.sqrt(spent / 50));
}

function update() {
  document.getElementById("score").innerText = Math.floor(score);

  document.getElementById("cpc").innerText = cpc * (1 + ascensions);
  document.getElementById("auto").innerText = auto * (1 + ascensions);

  document.getElementById("clickCost").innerText = clickCost;
  document.getElementById("autoCost").innerText = autoCost;

  document.getElementById("asc").innerText = ascensions;
  document.getElementById("bank").innerText = ascensionBank;
}

function clickChad() {
  score += cpc * (1 + ascensions);
  update();
}

function buyClick() {
  if (score >= clickCost) {
    score -= clickCost;
    totalSpent += clickCost;

    cpc += 1;
    clickCost = Math.floor(clickCost * 1.45);

    ascensionBank += calcAscensionGain(totalSpent);
    update();
  }
}

function buyAuto() {
  if (score >= autoCost) {
    score -= autoCost;
    totalSpent += autoCost;

    auto += 1;
    autoCost = Math.floor(autoCost * 1.65);

    ascensionBank += calcAscensionGain(totalSpent);
    update();
  }
}

/* ASCEND */
function claimAscension() {
  ascensions += ascensionBank;

  score = 0;
  cpc = 1;
  auto = 0;

  clickCost = 10;
  autoCost = 25;

  totalSpent = 0;
  ascensionBank = 0;

  update();
}

/* PASSIVE TICK */
setInterval(() => {
  score += auto * (1 + ascensions);
  update();
}, 1000);

update();

</script>

</body>
</html>
