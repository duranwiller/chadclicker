<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chad Willer Clicker</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(to bottom, #111, #222);
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    h1 {
      margin-top: 30px;
      font-size: 3rem;
      text-shadow: 2px 2px 10px black;
    }

    #score {
      font-size: 2rem;
      margin: 20px;
    }

    #perClick {
      margin-bottom: 20px;
      color: #ccc;
    }

    #chad {
      width: 260px;
      border-radius: 20px;
      cursor: pointer;
      transition: transform 0.08s;
      border: 4px solid white;
      box-shadow: 0 0 20px rgba(255,255,255,0.3);
    }

    #chad:active {
      transform: scale(0.94);
    }

    .shop {
      margin-top: 40px;
      background: rgba(255,255,255,0.08);
      padding: 20px;
      width: 300px;
      margin-left: auto;
      margin-right: auto;
      border-radius: 15px;
    }

    button {
      background: white;
      color: black;
      border: none;
      padding: 12px 18px;
      font-size: 1rem;
      border-radius: 10px;
      cursor: pointer;
      margin-top: 10px;
      width: 100%;
      transition: 0.2s;
    }

    button:hover {
      background: #ddd;
    }

    .footer {
      margin-top: 40px;
      color: #888;
      font-size: 0.9rem;
      margin-bottom: 30px;
    }
  </style>
</head>
<body>

  <h1>CHAD WILLER CLICKER</h1>

  <div id="score">Chad Points: 0</div>
  <div id="perClick">Points Per Click: 1</div>

  <!-- Replace image URL if you want -->
  <img
    id="chad"
    src="https://i.imgur.com/8QfQF8M.png"
    alt="Chad"
  >

  <div class="shop">
    <h2>UPGRADES</h2>

    <button onclick="buyUpgrade()">
      +1 Per Click
      <br>
      Cost: <span id="upgradeCost">10</span>
    </button>

    <button onclick="buyAutoClicker()">
      Auto Clicker (+1/sec)
      <br>
      Cost: <span id="autoCost">50</span>
    </button>
  </div>

  <div class="footer">
    made for the chad willer grindset
  </div>

  <script>
    let score = 0;
    let perClick = 1;

    let upgradeCost = 10;

    let autoClickers = 0;
    let autoCost = 50;

    const scoreText = document.getElementById("score");
    const perClickText = document.getElementById("perClick");
    const upgradeCostText = document.getElementById("upgradeCost");
    const autoCostText = document.getElementById("autoCost");

    document.getElementById("chad").addEventListener("click", () => {
      score += perClick;
      updateUI();
    });

    function buyUpgrade() {
      if (score >= upgradeCost) {
        score -= upgradeCost;
        perClick++;

        upgradeCost = Math.floor(upgradeCost * 1.5);

        updateUI();
      }
    }

    function buyAutoClicker() {
      if (score >= autoCost) {
        score -= autoCost;

        autoClickers++;

        autoCost = Math.floor(autoCost * 1.8);

        updateUI();
      }
    }

    setInterval(() => {
      score += autoClickers;
      updateUI();
    }, 1000);

    function updateUI() {
      scoreText.innerText = "Chad Points: " + score;
      perClickText.innerText = "Points Per Click: " + perClick;

      upgradeCostText.innerText = upgradeCost;
      autoCostText.innerText = autoCost;
    }
  </script>

</body>
</html>
