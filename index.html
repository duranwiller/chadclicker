<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Chad Willer Clicker</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #2b1b1b;
  color: white;
  overflow: hidden;
}

.top {
  position: absolute;
  top: 0;
  width: 100%;
  text-align: center;
  padding: 10px;
  font-size: 22px;
  font-weight: bold;
}

.container {
  display: flex;
  height: 100vh;
}

.left {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

.chad {
  width: 260px;
  border-radius: 20px;
  cursor: pointer;
  transition: 0.05s;
  box-shadow: 0 0 30px rgba(0,0,0,0.5);
}

.chad:active {
  transform: scale(0.97);
}

.stats {
  margin-top: 20px;
  font-size: 18px;
  text-align: center;
  line-height: 1.5em;
}

.right {
  width: 420px;
  background: #f0c27b;
  color: black;
  padding: 15px;
  overflow-y: auto;
}

.shop-title {
  font-size: 28px;
  font-weight: bold;
  text-align: center;
  margin-bottom: 10px;
}

.upgrade {
  background: #ffe0a3;
  margin: 10px 0;
  padding: 10px;
  border-radius: 12px;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.upgrade:hover {
  background: #ffd27a;
}

.small {
  font-size: 12px;
  opacity: 0.8;
}
</style>
</head>

<body>

<div class="top">
  💰 Chad Points: <span id="score">0</span>
</div>

<div class="container">

  <!-- LEFT -->
  <div class="left">

    <img class="chad"
      src="https://i.imgur.com/8QfQF8M.png"
      onclick="clickChad()"
    />

    <div class="stats">
      Per Click: <span id="cpc">1</span><br>
      Auto: <span id="auto">0</span>/sec<br><br>

      Ascensions: <span id="asc">0</span><br>
      Ascension Bank: <span id="bank">0</span>
    </div>

  </div>

  <!-- RIGHT SHOP -->
  <div class="right">

    <div class="shop-title">Click Power</div>

    <div class="upgrade" onclick="buyClick()">
      <div>
        Cursor<br>
        <span class="small">+1 per click</span>
      </div>
      <div>Cost: <span id="clickCost">10</span></div>
    </div>

    <div class="upgrade" onclick="buyAuto()">
      <div>
        Auto Click<br>
        <span class="small">+1 per second</span>
      </div>
      <div>Cost: <span id="autoCost">25</span></div>
    </div>

    <div class="upgrade" onclick="claimAscension()">
      <div>
        CLAIM ASCENSION<br>
        <span class="small">Reset run, gain permanent multiplier</span>
      </div>
      <div>RESET</div>
    </div>

  </div>

</div>

<script>
let score = 0;
let cpc = 1;
let auto = 0;

let clickCost = 10;
let autoCost = 25;

/* ASCENSION SYSTEM */
let ascensions = 0;
let ascensionBank = 0;
let totalSpent = 0;

function calcAscensionGain(spent) {
  return Math.floor(Math.log10(spent + 10) * Math.sqrt(spent / 50));
}

function update() {
  document.getElementById("score").innerText = Math.floor(score);

  document.getElementById("cpc").innerText = cpc * (1 + ascensions);
  document.getElementById("auto").innerText = auto * (1 + ascensions);

  document.getElementById("clickCost").innerText = clickCost;
  document.getElementById("autoCost").innerText = autoCost;

  document.getElementById("asc").innerText = ascensions;
  document.getElementById("bank").innerText = ascensionBank;
}

function clickChad() {
  score += cpc * (1 + ascensions);
  update();
}

function buyClick() {
  if (score >= clickCost) {
    score -= clickCost;
    totalSpent += clickCost;

    cpc += 1;
    clickCost = Math.floor(clickCost * 1.45);

    ascensionBank += calcAscensionGain(totalSpent);
    update();
  }
}

function buyAuto() {
  if (score >= autoCost) {
    score -= autoCost;
    totalSpent += autoCost;

    auto += 1;
    autoCost = Math.floor(autoCost * 1.65);

    ascensionBank += calcAscensionGain(totalSpent);
    update();
  }
}

/* RESET / ASCEND */
function claimAscension() {
  ascensions += ascensionBank;

  score = 0;
  cpc = 1;
  auto = 0;

  clickCost = 10;
  autoCost = 25;

  totalSpent = 0;
  ascensionBank = 0;

  update();
}

setInterval(() => {
  score += auto * (1 + ascensions);
  update();
}, 1000);

update();
</script>

</body>
</html>
